version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: staging
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /frontend
    target-branch: staging
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    target-branch: staging
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
